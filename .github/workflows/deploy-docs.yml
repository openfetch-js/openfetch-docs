# VitePress → GitHub Pages (official Actions deployment).
#
# REQUIRED — or the site will be wrong:
#   Repo Settings → Pages → Build and deployment → Source → GitHub Actions
#   (NOT "Deploy from a branch").
#
# Symptom when Source is wrong: View Page Source shows
#   <meta name="generator" content="Jekyll v3.10.0" />
# and you see raw tags like <ComparisonMatrix /> — that is Jekyll, not this build.

name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
